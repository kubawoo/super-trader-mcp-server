info:
  name: "resoource: historical prices"
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/mcp"
  headers:
    - name: Accept
      value: text/event-stream,application/json
    - name: Content-Type
      value: application/json
    - name: mcp-session-id
      value: "{{sessionId}}"
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 36,
        "method": "resources/read",
        "params": {
          "uri": "history://AAPL/csv?period=1mo&interval=1d"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
