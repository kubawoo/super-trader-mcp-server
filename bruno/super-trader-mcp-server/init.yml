info:
  name: init
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/mcp"
  headers:
    - name: Accept
      value: text/event-stream,application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 1,
        "method": "initialize",
        "params": {
          "protocolVersion": "2024-11-05",
          "capabilities": {},
          "clientInfo": {
            "name": "bruno-client",
            "version": "1.0.0"
          }
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar('sessionId', res.getHeader('mcp-session-id'))

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
